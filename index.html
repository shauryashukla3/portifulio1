<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RizzMC Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg3d"></canvas>

  <audio id="bgMusic" loop>
    <!-- Put your own mp3 here: assets/music.mp3 -->
    <source src="assets/music.mp3" type="audio/mpeg" />
  </audio>

  <main class="profile">
    <section class="glass-card">
      <div class="avatar-wrap">
        <div class="neon-ring"></div>
        <img src="assets/reference.jpg" alt="Profile avatar" class="avatar" />
      </div>

      <h1 class="glitch" data-text="Ri9zmc">Ri9zmc</h1>

      <p class="intro typing">
        Hello, my name is <span>[RizzInManual]</span><br>
        I'm a Minecraft Developer with <span>2.5 years</span> of experience in
        server development, configurations and management.
      </p>

      <div class="user-card">
        <img src="assets/reference.jpg" alt="User" />
        <div>
          <h2>ri9zmc <button class="skill">SKLL</button></h2>
          <p>last seen 3 days ago</p>
        </div>
      </div>

      <div class="buttons">
        <a href="mailto:yourmail@example.com" class="btn">✉ Contact</a>
        <a href="#" class="btn green">⛏ Portfolio</a>
      </div>

      <button id="musicBtn" class="music-btn">▶ Play Music</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
